<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDFM 108.8 | STEALTH PLAYER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; font-family: 'Rajdhani', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 40px; }
        .bar { width: 6px; background: #ff00ff; border-radius: 3px; height: 10px; }
        .is-playing .bar { animation: dance 0.6s ease-in-out infinite alternate; }
        @keyframes dance { from { height: 10px; } to { height: 50px; } }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        #playBtn { transition: all 0.3s ease; filter: drop-shadow(0 0 10px rgba(255,255,255,0)); }
        .is-playing #playBtn { color: #ff00ff; filter: drop-shadow(0 0 20px rgba(255, 0, 255, 0.8)); }
    </style>
</head>
<body>

    <div class="glass w-[90%] max-w-md p-10 flex flex-col items-center shadow-2xl">
        <!-- DYNAMIC STATUS HUD -->
        <div class="w-full flex justify-between mb-4">
            <span id="track-count" class="text-[10px] orbitron text-white/20">TRACK 1/3</span>
            <div class="flex items-center">
                <div id="dot" class="w-2 h-2 bg-white/20 rounded-full mr-2"></div>
                <span id="stat" class="text-[10px] orbitron text-white/30 tracking-widest uppercase">Off-Air</span>
            </div>
        </div>

        <!-- ARTWORK -->
        <div class="w-64 h-64 bg-zinc-900 rounded-2xl mb-8 overflow-hidden border border-white/5 shadow-2xl">
            <img id="artwork" src="lexi-pilot-1.jpg" class="w-full h-full object-cover">
        </div>

        <h1 id="title" class="orbitron text-white text-xl tracking-tighter mb-1 text-center">LAN KWAI FUNG</h1>
        <p id="artist" class="text-pink-500 text-[10px] font-bold tracking-[0.5em] mb-10 uppercase">Architect Maco</p>

        <!-- VISUALIZER -->
        <div id="viz" class="flex items-end gap-2 h-12 mb-10">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.5s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
        </div>

        <!-- STEALTH PLAYER CONTROLS -->
        <div class="flex items-center gap-12">
            <button id="prevBtn" class="text-white/20 hover:text-white transition-colors text-2xl">⏮</button>
            <button id="playBtn" class="text-white text-6xl active:scale-90 transition-all cursor-pointer">▶</button>
            <button id="nextBtn" class="text-white/20 hover:text-white transition-colors text-2xl">⏭</button>
        </div>
        
        <audio id="engine" src="track1.mp3"></audio>
    </div>

    <script>
        const playlist = [
            { title: "WHO WE ARE - THE SICK TEAM (LKF MIX)", artist: "Architect Maco", file: "track1.mp3", art: "lexi-pilot-1.jpg" },
            { title: "THE GRAND - THE SICK TEAM (TGD MIX)", artist: "Architect Maco", file: "track2.mp3", art: "lexi-pilot-2.jpg" },
            { title: "ROBERT CHAI - THE SICK TEAM (RCT MIX)", artist: "Architect Maco", file: "track3.mp3", art: "lexi-pilot-3.jpg" }
        ];

        let currentIdx = 0;
        const audio = document.getElementById('engine');
        const btn = document.getElementById('playBtn');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const title = document.getElementById('title');
        const artwork = document.getElementById('artwork');
        const count = document.getElementById('track-count');
        const viz = document.getElementById('viz');
        const dot = document.getElementById('dot');
        const stat = document.getElementById('stat');

        function loadTrack(idx) {
            const track = playlist[idx];
            audio.src = track.file;
            title.innerText = track.title;
            artwork.src = track.art;
            count.innerText = `TRACK ${idx + 1}/${playlist.length}`;
            if (!audio.paused) audio.play();
        }

        btn.onclick = () => {
            if (audio.paused) {
                audio.play();
                btn.innerText = "⏸";
                viz.classList.add('is-playing');
                dot.classList.add('bg-red-600', 'animate-pulse');
                stat.innerText = "On-Air";
                stat.classList.add('text-red-500');
                stat.classList.remove('text-white/30');
            } else {
                audio.pause();
                btn.innerText = "▶";
                viz.classList.remove('is-playing');
                dot.classList.remove('bg-red-600', 'animate-pulse');
                stat.innerText = "Off-Air";
                stat.classList.remove('text-red-500');
                stat.classList.add('text-white/30');
            }
        };

        nextBtn.onclick = () => {
            currentIdx = (currentIdx + 1) % playlist.length;
            loadTrack(currentIdx);
        };

        prevBtn.onclick = () => {
            currentIdx = (currentIdx - 1 + playlist.length) % playlist.length;
            loadTrack(currentIdx);
        };
    </script>
</body>
</html>
