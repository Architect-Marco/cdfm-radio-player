<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CDFM 108.8 | SOVEREIGN VIDEO-POD v6.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; font-family: 'Rajdhani', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0; }
        
        .glass { 
            background: rgba(0, 0, 0, 0.95); 
            backdrop-filter: blur(30px); 
            border: 1.8px solid rgba(255, 255, 255, 1); 
            border-radius: 45px; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 1); 
            width: 310px; 
            padding: 20px; 
            position: relative; 
            margin-top: -40px; 
            z-index: 100; 
        }

        /* 145PX: THE FINAL CINEMATIC SNAP */
        .screen { 
            width: 100%; 
            height: 145px; 
            background: #000; 
            border-radius: 18px; 
            margin-bottom: 10px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.15); 
            position: relative; 
        }
        
        video, #artwork-display { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            position: absolute; 
            top: 0; 
            left: 0; 
            transition: opacity 0.5s ease; 
        }

        #artwork-display { opacity: 0; }

        .bar { width: 3px; background: #ff00ff; border-radius: 2px; height: 8px; margin: 0 1px; opacity: 0.3; transition: 0.3s; }
        .is-playing .bar { animation: dance 0.6s ease-in-out infinite alternate; opacity: 1; }
        @keyframes dance { from { height: 8px; } to { height: 32px; } }

        .control-wheel { border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 50%; width: 170px; height: 170px; display: flex; align-items: center; justify-content: center; gap: 20px; margin: 8px auto 0; position: relative; }
        #playBtn { position: relative; background: transparent; border: 1.5px solid rgba(255,255,255,0.8); border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .is-playing #playBtn::after { content: ''; position: absolute; inset: -6px; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.2); opacity: 0; } }
        .orbitron { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>
    <div class="glass flex flex-col items-center">
        <div class="w-full flex justify-between mb-4 px-2">
            <span id="track-count" class="text-[10px] orbitron text-white uppercase font-bold tracking-widest">INTRO</span>
            <div class="flex items-center">
                <div id="dot" class="w-1.5 h-1.5 bg-white/20 rounded-full mr-2"></div>
                <span id="status-text" class="text-[9px] orbitron text-white/40 uppercase font-bold tracking-widest">OFF-AIR</span>
            </div>
        </div>

        <div class="screen">
            <video id="team-video" playsinline>
                <source src="team-loop.mp4" type="video/mp4">
            </video>
            <img id="artwork-display" src="lexi-pilot-1.jpg">
        </div>

        <div class="h-12 flex flex-col items-center justify-center text-center px-2">
            <h1 id="title" class="orbitron text-white text-[11px] tracking-tighter mb-1 uppercase leading-tight">THE SICK TEAM INTRODUCTION</h1>
            <p class="text-pink-500 text-[9px] font-bold tracking-[0.4em] uppercase">Architect Marco</p>
        </div>

        <div id="viz" class="flex items-end justify-center gap-1 h-8 mb-2">
            <div class="bar" style="animation-delay: 0.1s"></div><div class="bar" style="animation-delay: 0.3s"></div><div class="bar" style="animation-delay: 0.5s"></div><div class="bar" style="animation-delay: 0.2s"></div><div class="bar" style="animation-delay: 0.4s"></div><div class="bar" style="animation-delay: 0.6s"></div><div class="bar" style="animation-delay: 0.1s"></div><div class="bar" style="animation-delay: 0.3s"></div><div class="bar" style="animation-delay: 0.5s"></div><div class="bar" style="animation-delay: 0.2s"></div><div class="bar" style="animation-delay: 0.4s"></div><div class="bar" style="animation-delay: 0.6s"></div>
        </div>

        <div class="control-wheel">
            <button id="prevBtn" class="opacity-30 hover:opacity-100"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button id="playBtn">
                <div id="playIcon" class="w-0 h-0 border-t-[8px] border-t-transparent border-l-[14px] border-l-white border-b-[8px] border-b-transparent ml-1"></div>
            </button>
            <button id="nextBtn" class="opacity-30 hover:opacity-100"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M6 6l8.5 6L6 18zm9 0h2v12h-2z"/></svg></button>
        </div>
    </div>

    <script>
        const tracks = [
            { isIntro: true, title: "THE SICK TEAM INTRODUCTION", file: "team-loop.mp4", art: "lexi-pilot-1.jpg" },
            { title: "WHO WE ARE (LKF MIX)", file: "track1.mp3", art: "lexi-pilot-1.jpg" },
            { title: "THE GRAND (TGD MIX)", file: "track2.mp3", art: "lexi-pilot-2.jpg" },
            { title: "ROBERT CHAI (RCT MIX)", file: "track3.mp3", art: "lexi-pilot-3.jpg" },
            { title: "HK NIGHTLIFE (HKNL MIX)", file: "track4.mp3", art: "lexi-pilot-4.jpg" },
            { title: "IM THE SCAR (TSYCE MIX)", file: "track5.mp3", art: "lexi-pilot-5.jpg" },
            { title: "ROBERT CHAI (HBT MIX)", file: "track6.mp3", art: "lexi-pilot-6.jpg" },
            { title: "LE SAU PEH LAH (LSPL MIX)", file: "track7.mp3", art: "lexi-pilot-7.jpg" },
            { title: "LAN KWAI FUNG (LKFTST MIX)", file: "track8.mp3", art: "lexi-pilot-8.jpg" }
        ];

        let idx = 0; let playing = false; const audio = new Audio();
        const playBtn = document.getElementById('playBtn'); const playIcon = document.getElementById('playIcon');
        const glass = document.querySelector('.glass'); const title = document.getElementById('title');
        const trackCount = document.getElementById('track-count'); const video = document.getElementById('team-video');
        const artDisplay = document.getElementById('artwork-display'); const dot = document.getElementById('dot');
        const statusText = document.getElementById('status-text');

        function load(i) {
            const t = tracks[i];
            if (t.isIntro) {
                video.style.opacity = "1"; artDisplay.style.opacity = "0";
                trackCount.innerText = "INTRO";
            } else {
                video.style.opacity = "0"; artDisplay.style.opacity = "1";
                artDisplay.src = t.art; audio.src = t.file;
                trackCount.innerText = `TRACK ${i}/8`;
            }
            title.innerText = t.title;
            if (playing) t.isIntro ? video.play() : audio.play();
        }

        playBtn.onclick = () => {
            if (playing) {
                playing = false; audio.pause(); video.pause();
                glass.classList.remove('is-playing');
                playIcon.className = "w-0 h-0 border-t-[8px] border-t-transparent border-l-[14px] border-l-white border-b-[8px] border-b-transparent ml-1";
                playIcon.innerHTML = '';
                dot.className = "w-1.5 h-1.5 bg-white/20 rounded-full mr-2";
                statusText.innerText = "OFF-AIR";
            } else {
                playing = true;
                if (tracks[idx].isIntro) { video.play(); } else { audio.play(); }
                glass.classList.add('is-playing');
                playIcon.className = "flex gap-1";
                playIcon.innerHTML = '<div class="w-1 h-4 bg-white"></div><div class="w-1 h-4 bg-white"></div>';
                dot.className = "w-1.5 h-1.5 bg-pink-500 rounded-full mr-2 shadow-[0_0_10px_#ff00ff]";
                statusText.innerText = "ON-AIR";
            }
        };

        video.onended = () => { idx = 1; load(idx); if(playing) audio.play(); };
        audio.onended = () => { idx = (idx + 1) % tracks.length; if(idx === 0) idx = 1; load(idx); };
        document.getElementById('nextBtn').onclick = () => { idx = (idx + 1) % tracks.length; load(idx); };
        document.getElementById('prevBtn').onclick = () => { idx = (idx - 1 + tracks.length) % tracks.length; load(idx); };

        load(idx);
    </script>
</body>
</html>
