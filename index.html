<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDFM 108.8 | MULTI-TRACK PLAYER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; font-family: 'Rajdhani', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; }
        .bar { width: 6px; background: #ff00ff; border-radius: 3px; height: 10px; }
        .is-playing .bar { animation: dance 0.6s ease-in-out infinite alternate; }
        @keyframes dance { from { height: 10px; } to { height: 50px; } }
        .orbitron { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>

    <div class="glass w-[90%] max-w-md p-10 flex flex-col items-center shadow-[0_0_50px_rgba(255,0,255,0.1)]">
        <div class="w-full flex justify-between mb-4">
            <span id="track-count" class="text-[10px] orbitron text-white/20">TRACK 1/3</span>
            <div class="flex items-center">
                <div id="dot" class="w-2 h-2 bg-white/20 rounded-full mr-2"></div>
                <span id="stat" class="text-[10px] orbitron text-white/30 tracking-widest uppercase">Off-Air</span>
            </div>
        </div>

        <div class="w-64 h-64 bg-zinc-900 rounded-2xl mb-8 overflow-hidden border border-white/10 shadow-2xl">
            <img id="artwork" src="lexi-pilot.jpg" class="w-full h-full object-cover">
        </div>

        <h1 id="title" class="orbitron text-white text-xl tracking-tighter mb-1 text-center">LAN KWAI FUNG</h1>
        <p id="artist" class="text-pink-500 text-[10px] font-bold tracking-[0.5em] mb-10 uppercase">Architect Maco</p>

        <div id="viz" class="flex items-end gap-2 h-12 mb-10">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.5s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
        </div>

        <div class="flex items-center gap-10">
            <button id="prevBtn" class="text-white/40 hover:text-white transition-colors text-xl">⏮</button>
            <button id="playBtn" class="w-20 h-20 bg-white rounded-full flex items-center justify-center text-black text-3xl shadow-white shadow-2xl hover:scale-105 active:scale-90 transition-all">▶</button>
            <button id="nextBtn" class="text-white/40 hover:text-white transition-colors text-xl">⏭</button>
        </div>
        
        <audio id="engine" src="track1.mp3"></audio>
    </div>

    <script>
        // THE PLAYLIST CODEX
        const playlist = [
            { title: "LAN KWAI FUNG", artist: "Architect Maco", file: "track1.mp3", art: "lexi-pilot.jpg" },
            { title: "SICK TEAM MIX", artist: "Lexi Con #001", file: "track2.mp3", art: "lexi-pilot.jpg" }, // Add more here!
            { title: "NOIR SECTOR 39:02", artist: "Architect Maco", file: "track3.mp3", art: "lexi-pilot.jpg" }
        ];

        let currentIdx = 0;
        const audio = document.getElementById('engine');
        const btn = document.getElementById('playBtn');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const title = document.getElementById('title');
        const artwork = document.getElementById('artwork');
        const count = document.getElementById('track-count');

        function loadTrack(idx) {
            const track = playlist[idx];
            audio.src = track.file;
            title.innerText = track.title;
            artwork.src = track.art;
            count.innerText = `TRACK ${idx + 1}/${playlist.length}`;
            if (!audio.paused) audio.play();
        }

        btn.onclick = () => {
            if (audio.paused) {
                audio.play();
                btn.innerText = "⏸";
                document.getElementById('viz').classList.add('is-playing');
                document.getElementById('dot').classList.add('bg-red-600', 'animate-pulse');
            } else {
                audio.pause();
                btn.innerText = "▶";
                document.getElementById('viz').classList.remove('is-playing');
                document.getElementById('dot').classList.remove('bg-red-600', 'animate-pulse');
            }
        };

        nextBtn.onclick = () => {
            currentIdx = (currentIdx + 1) % playlist.length;
            loadTrack(currentIdx);
            if (btn.innerText === "⏸") audio.play();
        };

        prevBtn.onclick = () => {
            currentIdx = (currentIdx - 1 + playlist.length) % playlist.length;
            loadTrack(currentIdx);
            if (btn.innerText === "⏸") audio.play();
        };
    </script>
</body>
</html>
