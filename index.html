<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDFM 108.8 | NOIR SECTOR PLAYER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%); font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .neon-text { text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
        .neon-border { box-shadow: 0 0 15px rgba(255, 0, 255, 0.3); }
        .orbitron { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <!-- MAIN PLAYER INTERFACE -->
    <div class="glass w-full max-w-4xl h-[600px] flex overflow-hidden neon-border">
        
        <!-- SIDEBAR: STATIONS -->
        <div class="w-1/4 border-r border-white/10 p-6 flex flex-col gap-4">
            <h2 class="orbitron text-pink-500 text-xs tracking-widest mb-4">STATIONS</h2>
            <div class="p-3 bg-pink-500/20 rounded-xl border border-pink-500/50 text-white cursor-pointer">108.8 CDFM</div>
            <div class="p-3 hover:bg-white/5 rounded-xl text-white/50 cursor-pointer">107.9 WKOR</div>
            <div class="p-3 hover:bg-white/5 rounded-xl text-white/50 cursor-pointer">NOIR SECTOR</div>
        </div>

        <!-- HERO SECTION -->
        <div class="flex-1 flex flex-col p-8 relative">
            <div class="absolute top-8 right-8 flex items-center gap-2">
                <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span>
                <span class="text-white text-xs orbitron">LIVE ON-AIR</span>
            </div>

            <!-- LEXI-CON ARTWORK -->
            <div class="w-64 h-64 mx-auto rounded-2xl overflow-hidden shadow-2xl mb-8 border-2 border-white/20">
                <img src="https://raw.githubusercontent.com/Architect-Marco/cdfm-radio-player/main/lexi_placeholder.jpg" alt="Lexi-Con" class="w-full h-full object-cover" id="hero-art">
            </div>

            <div class="text-center">
                <h1 class="orbitron text-white text-2xl mb-1 tracking-tighter" id="track-title">I CANT LET THIS FEELING GO</h1>
                <p class="text-pink-500 uppercase tracking-[0.3em] text-sm font-bold mb-8">Ft: LEXI CON (#001)</p>
            </div>

            <!-- AUDIO VISUALIZER (SIMULATED) -->
            <div class="flex justify-center items-end gap-1 h-12 mb-8">
                <div class="w-1 bg-pink-500 h-4 animate-[bounce_1s_infinite]"></div>
                <div class="w-1 bg-white h-8 animate-[bounce_1.2s_infinite]"></div>
                <div class="w-1 bg-pink-500 h-10 animate-[bounce_0.8s_infinite]"></div>
                <div class="w-1 bg-white h-6 animate-[bounce_1.5s_infinite]"></div>
                <div class="w-1 bg-pink-500 h-8 animate-[bounce_1.1s_infinite]"></div>
            </div>

            <!-- CONTROLS -->
            <div class="flex items-center justify-center gap-12 text-white">
                <button class="hover:text-pink-500 transition-colors">⏮</button>
                <button class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-black text-2xl hover:bg-pink-500 transition-all shadow-lg" id="play-btn">▶</button>
                <button class="hover:text-pink-500 transition-colors">⏭</button>
            </div>
        </div>
    </div>

    <script>
        // LOGIC FOR THE SIFU ARCHITECT
        const playBtn = document.getElementById('play-btn');
        let isPlaying = false;

        playBtn.onclick = () => {
            isPlaying = !isPlaying;
            playBtn.innerHTML = isPlaying ? "⏸" : "▶";
            // Audio trigger logic will go here
        };
    </script>
</body>
</html>
