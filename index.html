<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDFM 108.8 | SOVEREIGN MINI-POD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; font-family: 'Rajdhani', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .glass { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(30px); border: 1.5px solid rgba(255, 255, 255, 0.9); border-radius: 40px; box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); width: 300px; padding: 15px; position: relative; display: flex; flex-col; items-center; }
        .bar { width: 3px; background: #ff00ff; border-radius: 2px; height: 8px; margin: 0 1px; transition: height 0.2s ease; }
        .is-playing .bar { animation: dance 0.6s ease-in-out infinite alternate; }
        @keyframes dance { from { height: 8px; } to { height: 30px; } }
        .control-wheel { border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50%; width: 150px; height: 150px; display: flex; align-items: center; justify-content: center; gap: 20px; margin: 0 auto; position: relative; }
        #playBtn { position: relative; background: transparent; border: 1.2px solid rgba(255,255,255,0.8); border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; z-index: 10; }
        .is-playing #playBtn::after { content: ''; position: absolute; inset: -6px; border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 50%; animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.2); opacity: 0; } }
        .orbitron { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>
    <div class="glass flex flex-col items-center">
        <div class="w-full flex justify-between mb-3 px-2">
            <span id="track-count" class="text-[9px] orbitron text-white uppercase font-bold tracking-widest">TRACK 1/8</span>
            <div class="flex items-center">
                <div id="dot" class="w-2 h-2 bg-white/20 rounded-full mr-2"></div>
                <span class="text-[9px] orbitron text-white/40 uppercase font-bold tracking-widest">OFF-AIR</span>
            </div>
        </div>

        <div class="w-52 h-52 bg-zinc-900 rounded-2xl mb-2 overflow-hidden border border-white/5 shadow-2xl relative">
            <img id="artwork" src="lexi-pilot-1.jpg" class="w-full h-full object-cover">
        </div>

        <div class="h-16 flex flex-col items-center justify-center text-center px-2">
            <h1 id="title" class="orbitron text-white text-sm tracking-tighter mb-1 uppercase leading-tight">Syncing...</h1>
            <p class="text-pink-500 text-[9px] font-bold tracking-[0.4em] uppercase">Architect Sherman</p>
        </div>

        <div id="viz" class="flex items-end justify-center gap-1 h-8 mb-4">
            <div class="bar" style="animation-delay: 0.1s"></div><div class="bar" style="animation-delay: 0.3s"></div><div class="bar" style="animation-delay: 0.5s"></div><div class="bar" style="animation-delay: 0.2s"></div><div class="bar" style="animation-delay: 0.4s"></div><div class="bar" style="animation-delay: 0.6s"></div><div class="bar" style="animation-delay: 0.1s"></div><div class="bar" style="animation-delay: 0.3s"></div><div class="bar" style="animation-delay: 0.5s"></div><div class="bar" style="animation-delay: 0.2s"></div><div class="bar" style="animation-delay: 0.4s"></div><div class="bar" style="animation-delay: 0.6s"></div>
        </div>

        <div class="control-wheel">
            <button id="prevBtn" class="opacity-40 hover:opacity-100"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button id="playBtn"><div id="playIcon" class="w-0 h-0 border-t-[8px] border-t-transparent border-l-[14px] border-l-white border-b-[8px] border-b-transparent ml-1"></div></button>
            <button id="nextBtn" class="opacity-40 hover:opacity-100"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M6 6l8.5 6L6 18zm9 0h2v12h-2z"/></svg></button>
        </div>
    </div>

    <script>
    const tracks = [
        { title: "WHO WE ARE (LKF MIX)", art: "lexi-pilot-1.jpg", file: "track1.mp3" },
        { title: "THE GRAND (TGD MIX)", art: "lexi-pilot-2.jpg", file: "track2.mp3" },
        { title: "ROBERT CHAI (RCT MIX)", art: "lexi-pilot-3.jpg", file: "track3.mp3" },
        { title: "HK NIGHTLIFE (HKNL MIX)", art: "lexi-pilot-4.jpg", file: "track4.mp3" },
        { title: "IM THE SCAR (TSYCE MIX)", art: "lexi-pilot-5.jpg", file: "track5.mp3" },
        { title: "ROBERT CHAI (HBT MIX)", art: "lexi-pilot-6.jpg", file: "track6.mp3" },
        { title: "LE SAU PEH LAH (LSPL MIX)", art: "lexi-pilot-7.jpg", file: "track7.mp3" },
        { title: "LAN KWAI FUNG (LKFTST MIX)", art: "lexi-pilot-8.jpg", file: "track8.mp3" }
    ];

    let index = 0; let playing = false; const au = new Audio();
    const pBtn = document.getElementById('playBtn'); const pIc = document.getElementById('playIcon');
    const gls = document.querySelector('.glass'); const tt = document.getElementById('title');
    const tc = document.getElementById('track-count'); const aw = document.getElementById('artwork');
    const dt = document.getElementById('dot'); const st = dt.nextElementSibling;

    function load(i) {
        const t = tracks[i]; 
        au.src = t.file; 
        tt.innerText = t.title;
        tc.innerText = `TRACK ${i + 1}/${tracks.length}`; 
        aw.src = t.art;
        if (playing) au.play().catch(e => console.log("Stream sync pending..."));
    }

    pBtn.onclick = () => {
        if (playing) {
            au.pause(); playing = false; gls.classList.remove('is-playing');
            pIc.className = "w-0 h-0 border-t-[8px] border-t-transparent border-l-[14px] border-l-white border-b-[8px] border-b-transparent ml-1";
            pIc.innerHTML = ''; dt.classList.replace('bg-pink-500', 'bg-white/20'); st.innerText = "OFF-AIR";
        } else {
            au.play().then(() => {
                playing = true; gls.classList.add('is-playing');
                pIc.className = "flex gap-1"; pIc.innerHTML = '<div class="w-1 h-4 bg-white"></div><div class="w-1 h-4 bg-white"></div>';
                dt.classList.replace('bg-white/20', 'bg-pink-500'); st.innerText = "ON-AIR";
            }).catch(e => alert("Signal Error: Ensure GitHub files are named track1.mp3 through track8.mp3"));
        }
    };

    document.getElementById('nextBtn').onclick = () => { index = (index + 1) % tracks.length; load(index); };
    document.getElementById('prevBtn').onclick = () => { index = (index - 1 + tracks.length) % tracks.length; load(index); };
    au.onended = () => { index = (index + 1) % tracks.length; load(index); };

    load(index);
</script>
