<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDFM 108.8 | SOVEREIGN MINI-POD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; font-family: 'Rajdhani', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0; }
        .glass { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(30px); border: 1.5px solid rgba(255, 255, 255, 0.9); border-radius: 45px; box-shadow: 0 0 30px rgba(255, 255, 255, 0.1); width: 300px; padding: 20px; position: relative; margin-top: -60px; z-index: 10; }
        .bar { width: 3px; background: #ff00ff; border-radius: 2px; height: 8px; margin: 0 1px; transition: height 0.2s ease; }
        .is-playing .bar { animation: dance 0.6s ease-in-out infinite alternate; }
        @keyframes dance { from { height: 8px; } to { height: 35px; } }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .control-wheel { border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 50%; width: 170px; height: 170px; display: flex; align-items: center; justify-content: center; gap: 20px; margin: 15px auto 5px; position: relative; }
        #playBtn { position: relative; background: transparent; border: 1.5px solid rgba(255,255,255,0.8); border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; cursor: pointer; }
        .is-playing #playBtn::after { content: ''; position: absolute; inset: -5px; border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 50%; animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.2); opacity: 0; } }
    </style>
</head>
<body>
    <div class="glass flex flex-col items-center">
        <div class="w-full flex justify-between mb-4 px-2">
            <span id="track-count" class="text-[9px] orbitron text-white uppercase font-bold tracking-widest">TRACK 1/8</span>
            <div class="flex items-center">
                <div id="dot" class="w-1.5 h-1.5 bg-white/20 rounded-full mr-2"></div>
                <span class="text-[9px] orbitron text-white/40 uppercase font-bold tracking-widest">OFF-AIR</span>
            </div>
        </div>

        <div class="w-56 h-52 bg-zinc-900 rounded-2xl mb-3 overflow-hidden border border-white/5 shadow-2xl relative">
            <img id="artwork" src="lexi-pilot-1.jpg" class="w-full h-full object-cover">
        </div>

        <div class="h-16 flex flex-col items-center justify-center text-center px-2">
            <h1 id="title" class="orbitron text-white text-sm tracking-tighter mb-1 uppercase leading-tight">Uplink Ready...</h1>
            <p class="text-pink-500 text-[9px] font-bold tracking-[0.4em] uppercase">Architect Sherman</p>
        </div>

        <div id="viz" class="flex items-end justify-center gap-1 h-10 mb-2">
            <div class="bar" style="animation-delay: 0.1s"></div><div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.5s"></div><div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div><div class="bar" style="animation-delay: 0.6s"></div>
            <div class="bar" style="animation-delay: 0.1s"></div><div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.5s"></div><div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div><div class="bar" style="animation-delay: 0.6s"></div>
        </div>

        <div class="control-wheel">
            <button id="prevBtn" class="opacity-40 hover:opacity-100 transition-opacity">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button id="playBtn">
                <div id="playIcon" class="w-0 h-0 border-t-[8px] border-t-transparent border-l-[14px] border-l-white border-b-[8px] border-b-transparent ml-1"></div>
            </button>
            <button id="nextBtn" class="opacity-40 hover:opacity-100 transition-opacity">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M6 6l8.5 6L6 18zm9 0h2v12h-2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const tracks = [
            { title: "WHO WE ARE (LKF MIX)", file: "track1.mp3", art: "lexi-pilot-1.jpg" },
            { title: "THE GRAND (TGD MIX)", file: "track2.mp3", art: "lexi-pilot-2.jpg" },
            { title: "ROBERT CHAI (RCT MIX)", file: "track3.mp3", art: "lexi-pilot-3.jpg" },
            { title: "HK NIGHTLIFE (HKNL MIX)", file: "track4.mp3", art: "lexi-pilot-4.jpg" },
            { title: "IM THE SCAR... (TSYCE MIX)", file: "track5.mp3", art: "lexi-pilot-5.jpg" },
            { title: "ROBERT CHAI (HBT MIX)", file: "track6.mp3", art: "lexi-pilot-6.jpg" },
            { title: "LE SAU PEH LAH (LSPL MIX)", file: "track7.mp3", art: "lexi-pilot-7.jpg" },
            { title: "LAN KWAI FUNG (LKFTST MIX)", file: "track8.mp3", art: "lexi-pilot-8.jpg" }
        ];

        let currentTrackIndex = 0;
        let isPlaying = false;
        const audio = new Audio();
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const glass = document.querySelector('.glass');
        const title = document.getElementById('title');
        const trackCount = document.getElementById('track-count');
        const artwork = document.getElementById('artwork');
        const dot = document.getElementById('dot');
        const statusText = dot.nextElementSibling;

        function loadTrack(index) {
            const track = tracks[index];
            audio.src = track.file;
            title.innerText = track.title;
            trackCount.innerText = `TRACK ${index + 1}/${tracks.length}`;
            artwork.src = track.art;
            if (isPlaying) audio.play().catch(e => console.log("Buffering..."));
        }

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                glass.classList.remove('is-playing');
                playIcon.className = "w-0 h-0 border-t-[8px] border-t-transparent border-l-[14px] border-l-white border-b-[8px] border-b-transparent ml-1";
                playIcon.innerHTML = '';
                dot.classList.replace('bg-pink-500', 'bg-white/20');
                statusText.innerText = "OFF-AIR";
            } else {
                audio.play().then(() => {
                    isPlaying = true;
                    glass.classList.add('is-playing');
                    playIcon.className = "flex justify-center gap-1";
                    playIcon.innerHTML = '<div class="w-1.5 h-4 bg-white"></div><div class="w-1.5 h-4 bg-white"></div>';
                    dot.classList.replace('bg-white/20', 'bg-pink-500');
                    statusText.innerText = "ON-AIR";
                }).catch(err => alert("Signal Error: Rename files to track1.mp3, etc. in GitHub."));
            }
        }

        playBtn.addEventListener('click', togglePlay);
        document.getElementById('nextBtn').addEventListener('click', () => { currentTrackIndex = (currentTrackIndex + 1) % tracks.length; loadTrack(currentTrackIndex); });
        document.getElementById('prevBtn').addEventListener('click', () => { currentTrackIndex = (currentTrackIndex - 1 + tracks.length) % tracks.length; loadTrack(currentTrackIndex); });
        audio.onended = () => { currentTrackIndex = (currentTrackIndex + 1) % tracks.length; loadTrack(currentTrackIndex); };
        loadTrack(currentTrackIndex);
    </script>
</body>
</html>
