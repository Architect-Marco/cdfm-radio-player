<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDFM 108.8 | THE SICK TEAM MINI-ALBUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
    body { background: #000; font-family: 'Rajdhani', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
    
    /* FIX: Added padding and fixed width */
    .glass { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(30px); border: 1.5px solid rgba(255, 255, 255, 0.9); border-radius: 45px; box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); width: 340px; padding: 25px; position: relative; }
    
    .bar { width: 4px; background: #ff00ff; border-radius: 2px; height: 10px; margin: 0 1px; }
    .is-playing .bar { animation: dance 0.6s ease-in-out infinite alternate; }
    @keyframes dance { from { height: 10px; } to { height: 50px; } }
    
    /* FIX: Moved margin inside brackets and set to -15px to pull it UP */
    .control-wheel { border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50%; width: 210px; height: 210px; display: flex; align-items: center; justify-content: center; gap: 30px; margin: 10px auto 20px; position: relative; }
    
    #playBtn { position: relative; background: transparent; border: 1.5px solid rgba(255,255,255,0.8); border-radius: 50%; width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
    
    /* The Secret Pulse Ring */
    .is-playing #playBtn::after { content: ''; position: absolute; inset: -8px; border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 50%; animation: pulse-ring 2s infinite; }
    @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.1); opacity: 0; } }
</style>
</head>
<body>

    <div class="glass flex flex-col items-center">
        <div class="w-full flex justify-between mb-4">
            <span id="track-count" class="text-[10px] orbitron text-white uppercase font-bold tracking-widest">TRACK 1/8</span>
            <div class="flex items-center">
                <div id="dot" class="w-2 h-2 bg-white/20 rounded-full mr-2"></div>
                <span class="text-[10px] orbitron text-white/40 uppercase font-bold tracking-widest">OFF-AIR</span>
            </div>
        </div>

        <!-- ARTWORK -->
        <div class="w-64 h-64 bg-zinc-900 rounded-2xl mb-2 overflow-hidden border border-white/5 shadow-2xl relative">
            <img id="artwork" src="lexi-pilot-1.jpg" class="w-full h-full object-cover">
        </div>

        <!-- TITLES -->
        <div class="h-20 flex flex-col items-center justify-center text-center">
            <h1 id="title" class="orbitron text-white text-lg tracking-tighter mb-1 uppercase leading-tight">Syncing Signal...</h1>
            <p id="artist" class="text-pink-500 text-[10px] font-bold tracking-[0.5em] uppercase">Architect Sherman</p>
        </div>

        <!-- VISUALIZER (12 LINES) -->
        <div id="viz" class="flex items-end justify-center gap-1 h-12 mb-4">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.5s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
            <div class="bar" style="animation-delay: 0.6s"></div>
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.5s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
            <div class="bar" style="animation-delay: 0.6s"></div>
        </div>

        <!-- CONTROLS (SINGLE MASTER WHEEL) -->
        <div class="control-wheel">
            <button id="prevBtn" class="opacity-40 hover:opacity-100 transition-opacity">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button id="playBtn">
                <div id="playIcon" class="w-0 h-0 border-t-[10px] border-t-transparent border-l-[16px] border-l-white border-b-[10px] border-b-transparent ml-1"></div>
            </button>
            <button id="nextBtn" class="opacity-40 hover:opacity-100 transition-opacity">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M6 6l8.5 6L6 18zm9 0h2v12h-2z"/></svg>
            </button>
        </div>
    </div> <!-- END GLASS -->

    <script>
        // ARCHITECT: Paste your JavaScript logic (track list, button listeners) below this line!
    </script>
</body>
</html>
